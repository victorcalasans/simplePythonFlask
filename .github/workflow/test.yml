name: "CI/CD - Test"


on:
  pull_request:
    branches:
      - "*"

env:
  IMAGE_NAME: ubuntu:latest

jobs:
  test:
    name: "Teste de Aplicação"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      checks: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        container: 
          - "docker.io/python:3.12.1-bullseye"
          - "docker.io/python:3.11.9-bullseye"
          - "docker.io/python:3.10.14-bullseye"
          - "docker.io/python:3.9.16-bullseye"
    container:
      image: ${{ matrix.container }}
    steps:
      - uses: actions/checkout@v4
      - name: "Apt get"
        run: |
          apt-get update && apt-get install -y python3-mysqldb libmariadb-dev gcc
      - name: "Install dependencias"
        run: |
          pip install -r requirements.txt
      - name: "Run tests"
        run: |
          nosetests --with-xunit --with-coverage --cover-package=project test_users.py
      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            *.xml*